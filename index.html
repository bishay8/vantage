<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Vantage — Financial Intelligence in Plain English</title>
<meta name="description" content="Vantage turns your whole financial life into plain-English answers — budgeting, investing, retirement, tax, business valuation, and stress-testing across 26 free tools." />
<meta name="theme-color" content="#4f46e5" />

<!-- Open Graph (iMessage, Slack, Facebook, LinkedIn) -->
<meta property="og:type" content="website" />
<meta property="og:site_name" content="Vantage" />
<meta property="og:title" content="Vantage — Financial Intelligence in Plain English" />
<meta property="og:description" content="Your whole financial life, explained simply. Budget, invest, retire, optimize tax, and stress-test your money across 26 free tools." />
<meta property="og:url" content="https://bishay8.github.io/vantage/" />
<meta property="og:image" content="https://bishay8.github.io/vantage/social-preview.png" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />

<!-- Twitter / X card -->
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="Vantage — Financial Intelligence in Plain English" />
<meta name="twitter:description" content="Your whole financial life, explained simply. 26 free tools — budget, invest, retire, tax, stress-test." />
<meta name="twitter:image" content="https://bishay8.github.io/vantage/social-preview.png" />

<!-- Favicon: inline SVG, indigo chip with a white V -->
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%234f46e5'/%3E%3Ctext x='50' y='72' font-family='Arial,sans-serif' font-size='66' font-weight='bold' fill='white' text-anchor='middle'%3EV%3C/text%3E%3C/svg%3E" />
<link rel="apple-touch-icon" href="https://bishay8.github.io/vantage/social-preview.png" />
<link rel="manifest" href="manifest.json" />

<!-- Tailwind Play CDN: generates utility CSS at runtime. Matches Vantage's
     "pre-defined utility classes only, no compiler" constraint. -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- React + ReactDOM UMD globals (window.React, window.ReactDOM). -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<!-- Babel Standalone: transpiles JSX in the browser. Slow first paint
     (~2-3s for the 3,500-line file), then cached. -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
  html, body, #root { height: 100%; margin: 0; }
  body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  #boot { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
          flex-direction: column; gap: 0.75rem; background: #f8fafc; color: #475569; z-index: 100; }
  #boot .spinner { width: 36px; height: 36px; border: 3px solid #cbd5e1; border-top-color: #6366f1;
                   border-radius: 50%; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="boot">
  <div class="spinner"></div>
  <div style="font-size: 15px; font-weight: 700; color: #334155;">Loading Vantage…</div>
  <div style="font-size: 12px; color: #94a3b8;">Your financial command center is starting up</div>
</div>
<div id="root"></div>

<!-- Load Vantage source as a Babel-transpiled script. -->
<script type="text/babel" data-presets="env,react" src="./vantage.jsx?v=11"></script>

<!-- Mount once vantage.jsx defines `Vantage`. -->
<script type="text/babel" data-presets="env,react">
  // Hide the boot screen once we get here.
  const boot = document.getElementById("boot");
  if (boot) boot.remove();
  ReactDOM.createRoot(document.getElementById("root")).render(<Vantage />);
</script>
</body>
</html>
